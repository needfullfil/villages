name: Generate AP Villages

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate apvillages.json
        run: |
          rm -f apvillages.json

          node <<'EOF'
          const fs = require("fs");

          const data = JSON.parse(fs.readFileSync("ap.json", "utf8"));
          const villages = [];

          function cleanName(name) {
            return String(name)

              // Remove (...) completely
              .replace(/\s*\([^)]*\)\s*/g, "")

              // A. Vemavaram -> A.Vemavaram
              .replace(/\.\s+/g, ".")

              // Remove spaces around hyphen
              .replace(/\s*-\s*/g, "-")

              // Remove spaces around slash
              .replace(/\s*\/\s*/g, "/")

              // Remove spaces after comma
              .replace(/,\s+/g, ",")

              // Remove remaining spaces
              .replace(/\s+/g, "")

              .trim();
          }

          for (const district of Object.values(data.districts || {})) {

            const districtName = district.name;

            for (const mandal of Object.values(district.subdistricts || {})) {

              const mandalName = mandal.name;

              for (const village of (mandal.villages || [])) {

                if (!village.name || !village.pincode) continue;

                villages.push({
                  n: cleanName(village.name),
                  m: cleanName(village.m || mandalName),
                  d: cleanName(village.d || districtName),
                  p: String(village.pincode).trim()
                });

              }
            }
          }

          villages.sort((a, b) => a.n.localeCompare(b.n));

          fs.writeFileSync(
            "apvillages.json",
            JSON.stringify(villages),
            "utf8"
          );

          console.log(`Generated ${villages.length} villages.`);
          console.log(`Size: ${fs.statSync("apvillages.json").size} bytes`);
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apvillages.json

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Auto-generate apvillages.json"
          git push
