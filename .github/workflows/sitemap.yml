name: Generate Sitemap

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate sitemap.xml
        run: |
          rm -f sitemap.xml

          node <<'EOF'
          const fs = require("fs");

          const villages = JSON.parse(
            fs.readFileSync("apvillages.json", "utf8")
          );

          function folderName(village, pincode) {
            return (
              village
                .toLowerCase()
                .normalize("NFKD")
                .replace(/[^\w]/g, "")
                + pincode
            );
          }

          const today = new Date().toISOString().split("T")[0];

          let xml = `<?xml version="1.0" encoding="UTF-8"?>
          <urlset
            xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">

          <url>
            <loc>https://ap.vidhwaan.com/</loc>
            <lastmod>${today}</lastmod>
            <changefreq>daily</changefreq>
            <priority>1.0</priority>
          </url>
          `;

          for (const v of villages) {

            const folder = folderName(v.n, v.p);

            xml += `
          <url>
            <loc>https://ap.vidhwaan.com/${folder}/</loc>
            <lastmod>${today}</lastmod>
            <changefreq>weekly</changefreq>
            <priority>0.9</priority>
          </url>`;

          }

          xml += `
          </urlset>`;

          fs.writeFileSync(
            "sitemap.xml",
            xml.trim(),
            "utf8"
          );

          console.log(`Generated sitemap.xml`);
          console.log(`URLs: ${villages.length + 1}`);
          EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add sitemap.xml

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Auto-generate sitemap.xml"
          git push
