name: Generate AP Villages

on:
  push:
    paths:
      - "ap.json"
      - ".github/workflows/generate-apvillages.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate apvillages.json
        shell: bash
        run: |
          rm -f apvillages.json

          node <<'EOF'
          const fs = require('fs');

          const data = JSON.parse(fs.readFileSync('ap.json', 'utf8'));

          const villages = [];

          if (data?.districts) {
            for (const district of Object.values(data.districts)) {
              if (!district?.subdistricts) continue;

              for (const mandal of Object.values(district.subdistricts)) {
                if (!Array.isArray(mandal?.villages)) continue;

                for (const v of mandal.villages) {
                  if (!v.name || !v.pincode) continue;

                  villages.push({
                    n: String(v.name).trim(),
                    p: String(v.pincode).trim()
                  });
                }
              }
            }
          }

          villages.sort((a, b) => a.n.localeCompare(b.n));

          fs.writeFileSync(
            'apvillages.json',
            JSON.stringify(villages, null, 2),
            'utf8'
          );

          console.log(`Generated ${villages.length} villages.`);
          console.log("Exists:", fs.existsSync("apvillages.json"));
          console.log("Size:", fs.statSync("apvillages.json").size, "bytes");
          EOF

      - name: Verify generated file
        run: |
          echo "Current directory:"
          pwd

          echo ""
          echo "Files:"
          ls -lah

          echo ""
          echo "First lines:"
          head -20 apvillages.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apvillages.json

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Auto-generate apvillages.json"
          git push
